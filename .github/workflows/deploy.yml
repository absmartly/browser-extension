name: Deploy to Chrome Web Store

on:
  push:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should-release: ${{ steps.check.outputs.should-release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: check
        run: |
          set -euo pipefail
          current=$(jq -r .version package.json)
          if [ -z "$current" ] || [ "$current" = "null" ]; then
            echo "::error::package.json has no .version"
            exit 1
          fi

          if previous=$(git show HEAD~1:package.json 2>/dev/null | jq -r .version 2>/dev/null); then
            :
          else
            previous=""
          fi

          if [ "$current" = "$previous" ]; then
            echo "Version unchanged ($current); skipping release."
            echo "should-release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Version changed: '$previous' -> '$current'; release will run."
          echo "should-release=true" >> "$GITHUB_OUTPUT"
          echo "version=$current" >> "$GITHUB_OUTPUT"

  deploy:
    needs: check-version
    if: needs.check-version.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: bun install --frozen-lockfile

      - run: bun run build

      - run: bun run package

      # Tag before publish so the release point is recorded even if Chrome Web
      # Store rejects the upload — re-running just retries the publish step.
      # Skip if the tag is already on the remote so reruns are idempotent.
      - name: Create and push tag v${{ env.VERSION }}
        run: |
          set -euo pipefail
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q .; then
            echo "Tag v$VERSION already exists on origin; skipping tag creation."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "v$VERSION"
          git push origin "v$VERSION"

      - name: Publish to Chrome Web Store
        uses: PlasmoHQ/bpp@v3
        with:
          keys: ${{ secrets.SUBMIT_KEYS }}
          artifact: build/chrome-mv3-prod.zip
